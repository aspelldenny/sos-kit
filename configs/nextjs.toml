name = "my-nextjs-app"
stack = "nextjs"
base_branch = "main"

[test]
command = "pnpm test --run"
timeout_secs = 300

[docs_gate]
enabled = true
blocking = false

[version]
strategy = "auto"

[changelog]
file = "docs/CHANGELOG.md"
style = "grouped"

[pr]
template = "default"
draft = false

[canary]
url = "https://my-app.com"
timeout_secs = 30
checks = ["http"]

[deploy]
provider = "ssh"
ssh = "deploy@myserver.com:22"
command = "cd /opt/app && git pull && docker compose build && docker compose up -d"
maintenance_mode = true

[learn]
dir = "~/.ship/learnings"
project_dir = ".ship/learnings"
